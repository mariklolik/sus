# SuS: Strategy-aware Surprise for Intrinsic Exploration
# Configuration aligned with arXiv:2601.10349

model:
  name: "Qwen/Qwen2.5-1.5B"
  use_4bit: false
  use_lora: true
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05

training:
  num_epochs: 3
  batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  max_length: 256
  num_trajectories_per_problem: 8

grpo:
  kl_coef: 0.1
  gamma: 1.0
  clip_range: 0.2

# SuS configuration (previously "tscl")
# Key parameters from paper Table 3:
# - lambda_ss = 1.0 (optimal)
# - lambda_sus = 0.0 (optimal - surprisingly, SuS component not needed)
tscl:
  enabled: true
  strategy_dim: 128

  # Intrinsic reward weights (Equation 4: r_int = lambda_ss * SS + lambda_sus * SuS)
  # Paper optimal values from Table 3
  lambda_ss: 1.0      # Weight for Strategy Stability (SS)
  lambda_sus: 0.0     # Weight for Strategy Surprise (SuS) - paper finds 0.0 optimal

  # Overall intrinsic reward weight (Equation 1: r = r_ext + alpha * r_int)
  alpha: 0.3

  only_reward_correct: true

  # Post-Hoc Strategy Encoder
  pse_model: "all-MiniLM-L6-v2"
  freeze_pse: true

  # Network architecture
  dropout: 0.1

  # World Model configuration (NEW - required by paper)
  world_model_hidden_dim: 256

  # Momentum Encoder (NEW - MoCo-style, required by paper)
  use_momentum_encoder: true
  momentum: 0.999

  # Contrastive Learning (NEW - InfoNCE, required by paper)
  use_contrastive: true
  temperature: 0.07  # Temperature for InfoNCE loss

  # Loss weight for intrinsic loss
  intrinsic_loss_coef: 0.1

cde:
  beta: 0.1
  perplexity_scale: 0.01

evaluation:
  eval_steps: 25
  num_eval_samples: 200
  compute_diversity_metrics: true
  k_values: [1, 5, 10]

seeds: [42, 123, 456]

output_dir: "outputs"
wandb_project: "sus-experiments"
